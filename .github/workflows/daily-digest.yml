# 定时生成 RSS digest → 提交 data/ → 若已连接 Cloudflare Pages 与本仓库，将在 push 后自动构建并部署
name: Daily digest

on:
  # 每天北京时间 01:17 自动运行；避开整点以降低 GitHub schedule 延迟/丢调度概率
  schedule:
    - cron: "17 1 * * *"
      timezone: "Asia/Shanghai"
  workflow_dispatch: {}

concurrency:
  group: daily-digest
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Cache digest (全文 / 翻译)
        uses: actions/cache@v5
        with:
          path: output/cache
          # 每次新 key 才能写入；restore-keys 取同 digest 版本下最近一次
          key: digest-cache-${{ runner.os }}-${{ hashFiles('apps/digest/src/digest.ts', 'bun.lock') }}-${{ github.run_id }}
          restore-keys: |
            digest-cache-${{ runner.os }}-${{ hashFiles('apps/digest/src/digest.ts', 'bun.lock') }}-
            digest-cache-${{ runner.os }}-

      - name: Install
        run: bun install

      - name: Run digest (24h, top 15)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_API_BASE: ${{ secrets.OPENAI_API_BASE }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_URL: ${{ secrets.GEMINI_API_URL }}
          GEMINI_API_BASE: ${{ secrets.GEMINI_API_BASE }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
        run: |
          if [ -z "$OPENAI_API_KEY" ] && [ -z "$GEMINI_API_KEY" ]; then
            echo "Set repository secret OPENAI_API_KEY and/or GEMINI_API_KEY" >&2
            exit 1
          fi
          cd apps/digest && bun src/digest.ts --hours 24 --top-n 15

      - name: Run weekly digest on Monday (Beijing time)
        run: |
          if [ "$(TZ=Asia/Shanghai date +%u)" != "1" ]; then
            echo "Not Monday in Asia/Shanghai, skipping weekly digest."
            exit 0
          fi
          WEEK_ID="$(TZ=Asia/Shanghai python3 - <<'PY'
          from datetime import datetime, timedelta
          from zoneinfo import ZoneInfo
          target = datetime.now(ZoneInfo("Asia/Shanghai")) - timedelta(days=7)
          print(target.strftime("%G-W%V"))
          PY
          )"
          echo "Building weekly digest for ${WEEK_ID}"
          cd apps/digest && bun src/weekly.ts --week "${WEEK_ID}"

      - name: Build site (verify data 可被 vite-ssg 消费)
        run: bun run build

      # data 为生成物；且 runner 上默认 Node 20 会触发 vp pre-commit 在 vite.config.ts 上失败（项目要求 Node >=22）
      # 勿用 `git add -u`：仅会暂存已跟踪文件的修改，新建如 `data/2026-04-23.json` 不会被提交
      - name: Commit data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "data: daily digest ${{ github.run_id }}"
          file_pattern: "data/**"
          commit_options: "--no-verify"
